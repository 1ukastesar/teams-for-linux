name: Build & Release

env:
  GH_TOKEN: ${{ SECRETS.GITHUB_TOKEN }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Restrict default permissions — each job declares only what it needs
permissions: {}

defaults:
  run:
    shell: bash

jobs:
  lint_and_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check config docs are in sync
        run: |
          npm run generate-config-docs
          if ! git diff --quiet -- docs-site/docs/configuration-generated.md docs-site/static/config-schema.json; then
            echo "::error::Generated config docs are out of sync with app/config/options.js. Run 'npm run generate-config-docs' and commit the result."
            git diff -- docs-site/docs/configuration-generated.md docs-site/static/config-schema.json
            exit 1
          fi

      - name: Audit dependencies
        run: npm audit --audit-level=critical

  e2e_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        # Electron's bundled extract-zip deterministically unpacks only one
        # file from the (complete, checksum-verified) zip in the current CI
        # image, leaving dist with no binary and no path.txt, which breaks
        # electron.launch() in the e2e tests. Download via @electron/get as
        # usual, then extract the cached zip with the system unzip — an
        # independent extractor — and write path.txt ourselves.
        env:
          DEBUG: "@electron/get:*"
        run: |
          set -euo pipefail
          rm -rf node_modules/electron/dist node_modules/electron/path.txt "$HOME/.cache/electron"
          # Populate the (checksum-verified) zip in the cache. The bundled
          # extraction fails here, so ignore its exit status.
          force_no_cache=true node node_modules/electron/install.js || true
          zip=$(find "$HOME/.cache/electron" -name 'electron-*.zip' | head -1)
          if [ -z "$zip" ]; then
            echo "::error::Electron zip was not downloaded"
            exit 1
          fi
          echo "Extracting $(stat -c%s "$zip") bytes from $zip"
          rm -rf node_modules/electron/dist
          mkdir -p node_modules/electron/dist
          unzip -q -o "$zip" -d node_modules/electron/dist
          chmod +x node_modules/electron/dist/electron
          printf electron > node_modules/electron/path.txt
          if [ ! -x node_modules/electron/dist/electron ]; then
            echo "::error::Electron binary missing after unzip"
            ls -laR node_modules/electron/dist | head -40
            exit 1
          fi
          echo "OK: electron binary installed ($(stat -c%s node_modules/electron/dist/electron) bytes)"

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  linux_x64:
    needs: [lint_and_audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Set build number
        # Inspired by https://github.com/orgs/community/discussions/26709#discussioncomment-14579020
        run: echo "BUILD_NUMBER=$(($GITHUB_RUN_NUMBER + $GITHUB_RUN_ATTEMPT - 2))" >> $GITHUB_ENV

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:x64 -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:x64 -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-linux-x64
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.AppImage
          retention-days: 30
          compression-level: 6

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/*

  linux_arm64:
    needs: [lint_and_audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Set build number
        # Inspired by https://github.com/orgs/community/discussions/26709#discussioncomment-14579020
        run: echo "BUILD_NUMBER=$(($GITHUB_RUN_NUMBER + $GITHUB_RUN_ATTEMPT - 2))" >> $GITHUB_ENV

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:arm64 -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:arm64 -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-linux-arm64
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.AppImage
          retention-days: 30
          compression-level: 6

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: dist/*

  linux_arm:
    needs: [lint_and_audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Set build number
        # Inspired by https://github.com/orgs/community/discussions/26709#discussioncomment-14579020
        run: echo "BUILD_NUMBER=$(($GITHUB_RUN_NUMBER + $GITHUB_RUN_ATTEMPT - 2))" >> $GITHUB_ENV

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:linux:arm -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:linux:arm -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-linux-armv7l
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.AppImage
          retention-days: 30
          compression-level: 6

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: dist/*

  dmg:
    needs: [lint_and_audit]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:mac:x64 -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:mac:x64 -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-macos-x64
          path: dist/*.dmg
          retention-days: 30
          compression-level: 6

  exe:
    needs: [lint_and_audit]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js and NPM
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm ci

      - name: Validate Release Notes
        run: npm run generate-release-info

      - name: Build for Release
        if: github.ref == 'refs/heads/main'
        run: npm run dist:windows -- --publish always

      - name: Build for PR
        if: github.ref != 'refs/heads/main'
        run: npm run dist:windows -- --publish never

      - name: Upload PR artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teams-for-linux-windows-x64
          path: dist/*.exe
          retention-days: 30
          compression-level: 6

  comment-artifacts:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    needs: [linux_x64, linux_arm64, linux_arm, dmg, exe]
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Comment on PR with artifact links
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // Find PR number — use payload directly for pull_request events,
            // fall back to branch-based search for push events
            let prNumber;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              const branchName = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              const pr = prs.find(p => p.head.ref === branchName);
              prNumber = pr?.number;
            }

            if (!prNumber) {
              console.log('No PR found for this workflow run');
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            const buildArtifacts = artifacts.artifacts.filter(a =>
              !a.name.includes('test-results') && !a.name.includes('playwright')
            );

            if (buildArtifacts.length === 0) {
              console.log('No build artifacts found');
              return;
            }

            // Group artifacts by platform
            const linuxX64 = buildArtifacts.find(a => a.name.includes('linux-x64'));
            const linuxArm64 = buildArtifacts.find(a => a.name.includes('linux-arm64'));
            const linuxArmv7l = buildArtifacts.find(a => a.name.includes('linux-armv7l'));
            const macos = buildArtifacts.find(a => a.name.includes('macos'));
            const windows = buildArtifacts.find(a => a.name.includes('windows'));

            let body = '## 📦 PR Build Artifacts\n\n✅ **Build successful!** Download artifacts:\n\n';

            // Linux section
            body += '### 🐧 Linux\n\n';
            if (linuxX64) {
              const sizeMB = (linuxX64.size_in_bytes / 1024 / 1024).toFixed(2);
              body += `**x86_64** (${sizeMB} MB) - Contains: .deb, .rpm, .tar.gz, .AppImage\n`;
              body += `- [${linuxX64.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${linuxX64.id})\n\n`;
            }
            if (linuxArm64) {
              const sizeMB = (linuxArm64.size_in_bytes / 1024 / 1024).toFixed(2);
              body += `**arm64** (${sizeMB} MB) - Contains: .deb, .rpm, .tar.gz, .AppImage\n`;
              body += `- [${linuxArm64.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${linuxArm64.id})\n\n`;
            }
            if (linuxArmv7l) {
              const sizeMB = (linuxArmv7l.size_in_bytes / 1024 / 1024).toFixed(2);
              body += `**armv7l** (${sizeMB} MB) - Contains: .deb, .rpm, .tar.gz, .AppImage\n`;
              body += `- [${linuxArmv7l.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${linuxArmv7l.id})\n\n`;
            }

            // macOS section
            if (macos) {
              const sizeMB = (macos.size_in_bytes / 1024 / 1024).toFixed(2);
              body += '### 🍎 macOS\n\n';
              body += `**x86_64** (${sizeMB} MB) - Contains: .dmg\n`;
              body += `- [${macos.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${macos.id})\n\n`;
            }

            // Windows section
            if (windows) {
              const sizeMB = (windows.size_in_bytes / 1024 / 1024).toFixed(2);
              body += '### 🪟 Windows\n\n';
              body += `**x86_64** (${sizeMB} MB) - Contains: .exe installer\n`;
              body += `- [${windows.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${windows.id})\n\n`;
            }

            body += '---\n\n';
            body += `📝 **Note:** Snap packages (.snap) are built in a [separate workflow](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/snap.yml)\n\n`;
            body += `[View workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n`;

            // Add last updated timestamp
            const now = new Date();
            const updateTime = now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
            body += `🕐 **Last updated:** ${updateTime}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 📦 PR Build Artifacts')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
  repo:
    needs: [linux_x64, linux_arm64, linux_arm]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/upload.yml
    secrets: inherit
